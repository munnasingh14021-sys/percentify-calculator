<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentify: The Ultimate Version</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236c5ce7'/%3E%3Cstop offset='100%25' stop-color='%23ff4757'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M50 5 L15 25 V65 L50 95 L85 65 V25 Z' fill='url(%23g)' stroke='%23f1f5f9' stroke-width='3'/%3E%3Ctext x='50' y='65' font-family='Segoe UI, sans-serif' font-weight='800' font-size='45' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #2d3748;
            --card-bg: #ffffff;
            --main-accent: #6c5ce7;
            --purple-clr: #6c5ce7;
            --green-clr: #2ed573;
            --orange-clr: #ffa502;
            --pink-clr: #ff6b81;
            --input-border: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --card-bg: #1e293b;
            --input-border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #f7f9fa;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            transition: background 0.3s;
        }

        /* 1. ANIMATED PARTICLE SPLASH SCREEN */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #110c26 0%, #05030a 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            z-index: 9999;
            overflow: hidden;
        }

        /* Particle Circle Elements */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            animation: floatUp 8s infinite linear;
            bottom: -50px;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }

        .splash-core {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: auto;
            margin-bottom: auto;
            z-index: 10;
        }

        .splash-logo-container {
            width: 120px;
            height: 120px;
            animation: pulseGlow 2.5s infinite ease-in-out;
        }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(108, 92, 231, 0.4)); }
            50% { transform: scale(1.06); filter: drop-shadow(0 0 30px rgba(255, 71, 87, 0.6)); }
        }

        .splash-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00f2fe, #6c5ce7, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .splash-tagline {
            color: #94a3b8;
            font-size: 1rem;
            margin-top: -10px;
            letter-spacing: 1px;
        }

        .start-btn {
            background: #0f172a;
            color: #00f2fe;
            border: 2px solid #334155;
            padding: 16px 50px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .start-btn:hover {
            background: #1e293b;
            color: #ffffff;
            border-color: #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
            transform: translateY(-4px);
        }

        .credit-text { font-size: 1rem; color: #475569; font-weight: 700; z-index: 10; }
        .credit-text span { color: #ff4757; text-shadow: 0 0 8px rgba(255, 71, 87, 0.5); }

        /* MAIN APP CONTAINER */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px 12px;
            display: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .logo-group { display: flex; align-items: center; gap: 10px; }
        .header-logo-icon { width: 38px; height: 38px; }
        header h1 {
            font-size: 1.7rem;
            font-weight: 900;
            background: linear-gradient(45deg, #6c5ce7, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .theme-btn {
            background: var(--card-bg);
            border: 2px solid var(--input-border);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* 2. SLIDE IN CARDS ANIMATIONS */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 22px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
            border-left: 8px solid #ccc;
            opacity: 0;
            transform: translateY(40px);
        }
        .card.slide-active {
            opacity: 1;
            transform: translateY(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s;
        }

        .card.purple { border-left-color: var(--purple-clr); }
        .card.green { border-left-color: var(--green-clr); }
        .card.orange { border-left-color: var(--orange-clr); }
        .card.pink { border-left-color: var(--pink-clr); }

        .card h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .card h2 .modern-icon { font-size: 1.3rem; }
        .purple h2 .modern-icon { color: var(--purple-clr); }
        .green h2 .modern-icon { color: var(--green-clr); }
        .orange h2 .modern-icon { color: var(--orange-clr); }
        .pink h2 .modern-icon { color: var(--pink-clr); }

        .input-row { display: flex; gap: 12px; margin-bottom: 15px; }
        .input-box { flex: 1; display: flex; flex-direction: column; gap: 6px; position: relative; }
        .input-box label { font-size: 0.85rem; font-weight: 600; opacity: 0.8; }

        input {
            width: 100%;
            padding: 12px 35px 12px 12px;
            border: 2px solid var(--input-border);
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }
        input:focus { border-color: var(--main-accent); }

        /* 5. INPUT AUTO CLEAR (X) BUTTONS */
        .clear-input-btn {
            position: absolute;
            right: 10px; bottom: 12px;
            width: 20px; height: 20px;
            background: rgba(0,0,0,0.1);
            color: var(--text-color);
            border-radius: 50%;
            border: none;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        [data-theme="dark"] .clear-input-btn { background: rgba(255,255,255,0.1); }

        .calc-btn {
            width: 100%; padding: 14px; border: none; border-radius: 14px; color: white;
            font-size: 1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        .calc-btn:active { transform: scale(0.98); }
        .purple .calc-btn { background: var(--purple-clr); }
        .green .calc-btn { background: var(--green-clr); }
        .orange .calc-btn { background: var(--orange-clr); }
        .pink .calc-btn { background: var(--pink-clr); }

        /* SATISFYING RESULT BANNER PACK */
        .result-banner {
            margin-top: 18px; padding: 16px; border-radius: 14px;
            flex-direction: column; gap: 12px; display: none;
        }
        .result-core-row { display: flex; justify-content: space-between; align-items: center; width: 100%; font-weight: 800; font-size: 1.25rem; }
        
        .purple .result-banner { background: rgba(108, 92, 231, 0.08); color: var(--purple-clr); }
        .green .result-banner { background: rgba(46, 213, 115, 0.08); color: var(--green-clr); }
        .orange .result-banner { background: rgba(255, 165, 2, 0.08); color: var(--orange-clr); }
        .pink .result-banner { background: rgba(255, 107, 129, 0.08); color: var(--pink-clr); }

        /* 4. DYNAMIC PROGRESS BAR */
        .progress-container {
            width: 100%; height: 6px; background: rgba(0,0,0,0.05); border-radius: 4px; overflow: hidden; display: none;
        }
        [data-theme="dark"] .progress-container { background: rgba(255,255,255,0.05); }
        .progress-bar {
            width: 0%; height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .purple .progress-bar { background: var(--purple-clr); }
        .green .progress-bar { background: var(--green-clr); }
        .orange .progress-bar { background: var(--orange-clr); }
        .pink .progress-bar { background: var(--pink-clr); }

        .action-btngroup { display: flex; gap: 8px; }
        .action-icon-btn {
            background: var(--card-bg); border: 1px solid currentColor; padding: 6px 12px;
            border-radius: 10px; font-size: 0.8rem; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 4px;
        }
        .whatsapp-btn { color: #25D366 !important; }

        /* HISTORY SYSTEM */
        .history-section { background: var(--card-bg); border-radius: 24px; padding: 22px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-top: 20px; }
        .history-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .clear-all-btn { background: none; border: none; color: #ff4757; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
        .history-item { padding: 12px; background: var(--bg-color); margin-bottom: 10px; border-radius: 12px; font-size: 0.95rem; display: flex; justify-content: space-between; font-weight: 600; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="particle-container"></div>
        <div></div>
        <div class="splash-core">
            <div class="splash-logo-container">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="gSplash" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00f2fe"/>
                            <stop offset="50%" stop-color="#6c5ce7"/>
                            <stop offset="100%" stop-color="#ff4757"/>
                        </linearGradient>
                    </defs>
                    <path d="M50 5 L15 25 V65 L50 95 L85 65 V25 Z" fill="url(#gSplash)" stroke="#ffffff" stroke-width="2"/>
                    <text x="50" y="66" font-family='Segoe UI', system-ui, sans-serif font-weight="900" font-size="48" fill="white" text-anchor="middle">P</text>
                </svg>
            </div>
            <div class="splash-title">Percentify</div>
            <div class="splash-tagline">Premium Utility Platform</div>
            <button class="start-btn" onclick="initiateAppWorkspace()">Start Engine</button>
        </div>
        <div class="credit-text">build by <span>rahul kumar ❤️</span></div>
    </div>

    <div class="container" id="appWorkspace">
        <header>
            <div class="logo-group">
                <div class="header-logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="gHeader" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#6c5ce7"/>
                                <stop offset="100%" stop-color="#ff4757"/>
                            </linearGradient>
                        </defs>
                        <path d="M50 5 L15 25 V65 L50 95 L85 65 V25 Z" fill="url(#gHeader)" stroke="#f1f5f9" stroke-width="3"/>
                        <text x="50" y="65" font-family="Segoe UI, sans-serif" font-weight="900" font-size="50" fill="white" text-anchor="middle">P</text>
                    </svg>
                </div>
                <h1>Percentify</h1>
            </div>
            <button class="theme-btn" id="themeToggle">🌙 Dark Mode</button>
        </header>

        <div class="card purple">
            <h2><span class="modern-icon">📊</span> Percentage of a Number</h2>
            <div class="input-row">
                <div class="input-box">
                    <label>What is (%)</label>
                    <input type="number" id="c1-val1" placeholder="e.g. 20" oninput="handleInputState(this)">
                    <button class="clear-input-btn" onclick="clearInputNode('c1-val1')">✕</button>
                </div>
                <div class="input-box">
                    <label>Of what number?</label>
                    <input type="number" id="c1-val2" placeholder="e.g. 500" oninput="handleInputState(this)">
                    <button class="clear-input-btn" onclick="clearInputNode('c1-val2')">✕</button>
                </div>
            </div>
            <button class="calc-btn" onclick="calcTypeOne()">Run Result</button>
            <div class="result-banner" id="c1-box">
                <div class="result-core-row">
                    <span id="c1-res">--</span>
                    <div class="action-btngroup">
                        <button class="action-icon-btn" onclick="copyValue('c1-res')">📋</button>
                        <button class="action-icon-btn whatsapp-btn" id="c1-wa">💬 Share</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card green">
            <h2><span class="modern-icon">🎓</span> Marks Percentage Matrix</h2>
            <div class="input-row">
                <div class="input-box">
                    <label>Marks Obtained</label>
                    <input type="number" id="c2-val1" placeholder="e.g. 450" oninput="handleInputState(this)">
                    <button class="clear-input-btn" onclick="clearInputNode('c2-val1')">✕</button>
                </div>
                <div class="input-box">
                    <label>Total Marks</label>
                    <input type="number" id="c2-val2" placeholder="e.g. 500" oninput="handleInputState(this)">
                    <button class="clear-input-btn" onclick="clearInputNode('c2-val2')">✕</button>
                </div>
            </div>
            <button class="calc-btn" onclick="calcTypeTwo()">Calculate Score</button>
            <div class="result-banner" id="c2-box">
                <div class="result-core-row">
                    <span id="c2-res">--</span>
                    <div class="action-btngroup">
                        <button class="action-icon-btn" onclick="copyValue('c2-res')">📋</button>
                        <button class="action-icon-btn whatsapp-btn" id="c2-wa">💬 Share</button>
                    </div>
                </div>
                <div class="progress-container" id="c2-progress-box">
                    <div class="progress-bar" id="c2-progress-bar"></div>
                </div>
            </div>
        </div>

        <div class="card orange">
            <h2><span class="modern-icon">📈</span> Percentage Increase</h2>
            <div class="input-row">
                <div class="input-box">
                    <label>Old Base Value</label>
                    <input type="number" id="c3-val1" placeholder="e.g. 100" oninput="handleInputState(this)">
                    <button class="clear-input-btn" onclick="clearInputNode('c3-val1')">✕</button>
                </div>
                <div class="input-box">
                    <label>New Value Target</label>
                    <input type="number" id="c3-val2" placeholder="e.g. 120" oninput="handleInputState(this)">
                    <button class="clear-input-btn" onclick="clearInputNode('c3-val2')">✕</button>
                </div>
            </div>
            <button class="calc-btn" onclick="calcTypeThree()">Measure Growth</button>
            <div class="result-banner" id="c3-box">
                <div class="result-core-row">
                    <span id="c3-res">--</span>
                    <div class="action-btngroup">
                        <button class="action-icon-btn" onclick="copyValue('c3-res')">📋</button>
                        <button class="action-icon-btn whatsapp-btn" id="c3-wa">💬 Share</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card pink">
            <h2><span class="modern-icon">📉</span> Percentage Decrease</h2>
            <div class="input-row">
                <div class="input-box">
                    <label>Old Base Value</label>
                    <input type="number" id="c4-val1" placeholder="e.g. 100" oninput="handleInputState(this)">
                    <button class="clear-input-btn" onclick="clearInputNode('c4-val1')">✕</button>
                </div>
                <div class="input-box">
                    <label>New Value Target</label>
                    <input type="number" id="c4-val2" placeholder="e.g. 80" oninput="handleInputState(this)">
                    <button class="clear-input-btn" onclick="clearInputNode('c4-val2')">✕</button>
                </div>
            </div>
            <button class="calc-btn" onclick="calcTypeFour()">Measure Drop</button>
            <div class="result-banner" id="c4-box">
                <div class="result-core-row">
                    <span id="c4-res">--</span>
                    <div class="action-btngroup">
                        <button class="action-icon-btn" onclick="copyValue('c4-res')">📋</button>
                        <button class="action-icon-btn whatsapp-btn" id="c4-wa">💬 Share</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-head">
                <h2>⏳ Time-Locked Journal</h2>
                <button class="clear-all-btn" onclick="clearAllLogs()">Clear Logs</button>
            </div>
            <div id="historyLogs"></div>
        </div>

    <script>
        let audioCtx = null;

        // Generate dynamic background splash particles
        function createSplashParticles() {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = Math.random() * 40 + 10 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.animationDuration = Math.random() * 6 + 6 + 's';
                container.appendChild(p);
            }
        }
        createSplashParticles();

        function initiateAppWorkspace() {
            playInputSound();
            const splash = document.getElementById('splash-screen');
            const mainApp = document.getElementById('appWorkspace');
            
            splash.style.opacity = '0';
            splash.style.visibility = 'hidden';
            mainApp.style.display = 'block';
            
            // Staggered trigger for cards entry animation
            setTimeout(() => {
                splash.style.display = 'none';
                document.querySelectorAll('.card').forEach((card, idx) => {
                    setTimeout(() => card.classList.add('slide-active'), idx * 120);
                });
            }, 500);
        }

        // 100% Offline Fast Click Engine
        function playInputSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1350, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.025); 
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.025); 

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.025);
            } catch (e) { console.log(e); }
        }

        // Handle auto-clear button visibility on typing
        function handleInputState(input) {
            playInputSound();
            const btn = input.nextElementSibling;
            btn.style.display = input.value.length > 0 ? 'flex' : 'none';
        }

        function clearInputNode(id) {
            const input = document.getElementById(id);
            input.value = '';
            input.nextElementSibling.style.display = 'none';
            playInputSound();
        }

        // WhatsApp Custom Intent Link Engine
        function setWhatsAppShare(btnId, message) {
            const btn = document.getElementById(btnId);
            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;
            btn.onclick = () => { playInputSound(); window.open(url, '_blank'); };
        }

        function triggerDisplay(boxId, textId, valueText) {
            playInputSound();
            document.getElementById(boxId).style.display = 'flex';
            document.getElementById(textId).innerText = valueText;
        }

        function calcTypeOne() {
            const p = parseFloat(document.getElementById('c1-val1').value);
            const n = parseFloat(document.getElementById('c1-val2').value);
            if(isNaN(p) || isNaN(n)) return alert("Operational Failure: Inputs missing!");
            const r = (p * n) / 100;
            triggerDisplay('c1-box', 'c1-res', `Result: ${r}`);
            setWhatsAppShare('c1-wa', `📊 Calculated via Percentify: ${p}% of ${n} is ${r}! Check it out!`);
            logHistory(`${p}% of ${n} = ${r}`, 'purple');
        }

        function calcTypeTwo() {
            const ob = parseFloat(document.getElementById('c2-val1').value);
            const tot = parseFloat(document.getElementById('c2-val2').value);
            if(isNaN(ob) || isNaN(tot)) return alert("Operational Failure: Inputs missing!");
            if(tot === 0) return alert("System Reset: Total Marks Cannot Be 0!");
            const r = ((ob / tot) * 100).toFixed(2);
            
            triggerDisplay('c2-box', 'c2-res', `Score: ${r}%`);
            
            // Progress bar trigger loading smoothly
            const pBox = document.getElementById('c2-progress-box');
            const pBar = document.getElementById('c2-progress-bar');
            pBox.style.display = 'block';
            setTimeout(() => { pBar.style.width = Math.min(r, 100) + '%'; }, 50);

            setWhatsAppShare('c2-wa', `🎓 Exam Score Matrix via Percentify: Got ${ob}/${tot} marks, which is a solid ${r}%!`);
            logHistory(`${ob}/${tot} = ${r}%`, 'green');
        }

        function calcTypeThree() {
            const oldV = parseFloat(document.getElementById('c3-val1').value);
            const newV = parseFloat(document.getElementById('c3-val2').value);
            if(isNaN(oldV) || isNaN(newV)) return alert("Operational Failure: Inputs missing!");
            if(oldV === 0) return alert("System Reset: Old Value Cannot Be 0!");
            const r = (((newV - oldV) / oldV) * 100).toFixed(2);
            triggerDisplay('c3-box', 'c3-res', `Growth: +${r}%`);
            setWhatsAppShare('c3-wa', `📈 Growth Metrics Tracked: Value jumped from ${oldV} to ${newV}, an increase of +${r}%!`);
            logHistory(`${oldV} ➔ ${newV} = +${r}%`, 'orange');
        }

        function calcTypeFour() {
            const oldV = parseFloat(document.getElementById('c4-val1').value);
            const newV = parseFloat(document.getElementById('c4-val2').value);
            if(isNaN(oldV) || isNaN(newV)) return alert("Operational Failure: Inputs missing!");
            if(oldV === 0) return alert("System Reset: Old Value Cannot Be 0!");
            const r = (((oldV - newV) / oldV) * 100).toFixed(2);
            triggerDisplay('c4-box', 'c4-res', `Drop: -${r}%`);
            setWhatsAppShare('c4-wa', `📉 Drop Metrics Tracked: Value fell from ${oldV} to ${newV}, a decrease of -${r}%!`);
            logHistory(`${oldV} ➔ ${newV} = -${r}%`, 'pink');
        }

        // History Management
        function logHistory(msg, themeColor) {
            let logs = JSON.parse(localStorage.getItem('simpleLogsModern')) || [];
            logs.unshift({ msg: msg, color: themeColor });
            if(logs.length > 5) logs.pop();
            localStorage.setItem('simpleLogsModern', JSON.stringify(logs));
            displayLogs();
        }

        function displayLogs() {
            const container = document.getElementById('historyLogs');
            container.innerHTML = '';
            let logs = JSON.parse(localStorage.getItem('simpleLogsModern')) || [];
            if(logs.length === 0) {
                container.innerHTML = '<p style="color:gray; font-size:0.9rem;">Logs empty. Run processing engine values...</p>';
                return;
            }
            logs.forEach(logItem => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.style.borderLeft = `4px solid var(--${logItem.color}-clr)`;
                item.innerHTML = `<span>${logItem.msg}</span><span style="color:var(--${logItem.color}-clr)">✔</span>`;
                container.appendChild(item);
            });
        }

        function clearAllLogs() {
            localStorage.removeItem('simpleLogsModern');
            displayLogs();
            playInputSound();
        }

        function copyValue(id) {
            const txt = document.getElementById(id).innerText.replace("Result: ","").replace("Score: ","").replace("Growth: ","").replace("Drop: ","");
            navigator.clipboard.writeText(txt);
            playInputSound();
            alert("Value copied to clipboard!");
        }

        // Setup Theme Swap
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeToggle.innerText = isDark ? "🌙 Dark Mode" : "☀️ Light Mode";
            playInputSound();
        });

        window.onload = displayLogs;
